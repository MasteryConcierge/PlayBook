<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Team — Mastery Events Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#071520;--bg2:#0A1D2E;--bg3:#0F2336;--bg4:#132840;
  --gold:#D4A853;--gold-d:#A07828;
  --text:#E8EEF4;--text2:#A8B8C8;--text3:#5A7080;
  --border:rgba(200,220,240,.08);--border2:rgba(200,220,240,.05);
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;overflow-x:hidden}
h1,h2,h3{font-family:'DM Serif Display',serif;font-weight:400}

/* ── Shell ── */
.shell{display:flex;min-height:100vh}

/* ── Sidebar ── */
.sidebar{width:260px;background:var(--bg);flex-shrink:0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;display:flex;flex-direction:column;border-right:1px solid var(--border)}
.main{margin-left:260px;flex:1;min-height:100vh}

.sb-logo{padding:1.75rem 1.5rem 1.25rem;border-bottom:1px solid var(--border)}
.sb-logo-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text);line-height:1.2;margin-bottom:3px}
.sb-logo-sub{font-size:10px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase}
.sb-yr{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:.9rem 1.5rem .4rem}
.sb-item{display:flex;align-items:center;gap:10px;padding:.6rem 1.5rem;cursor:pointer;transition:background .15s;position:relative;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:rgba(255,255,255,.04)}
.sb-item.active{background:rgba(212,168,83,.1)}
.sb-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);border-radius:0 2px 2px 0}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-name{font-size:13px;color:var(--text2);font-weight:400;line-height:1.2}
.sb-item.active .sb-name{color:var(--text);font-weight:500}
.sb-date{font-size:11px;color:var(--text3);margin-top:1px}

/* Calendar nav in sidebar */
.sb-cal-btn{display:flex;align-items:center;gap:8px;padding:.65rem 1.5rem;cursor:pointer;border:none;background:none;width:100%;font-family:"DM Sans",sans-serif;font-size:13px;color:var(--text2);transition:background .15s}
.sb-cal-btn:hover{background:rgba(255,255,255,.04)}
.sb-cal-btn.active{background:rgba(212,168,83,.1);color:var(--text)}
.sb-cal-btn.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
.sb-divider{height:1px;background:var(--border);margin:.5rem 0}
.sb-foot{margin-top:auto;padding:1.25rem 1.5rem;border-top:1px solid var(--border);font-size:11px;color:var(--text3);line-height:1.6}

/* ── Calendar page ── */
.cal-wrap{padding:2rem 2.5rem}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem}
.cal-title-block{}
.cal-eye{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.3rem}
.cal-title{font-family:"DM Serif Display",serif;font-size:28px;color:var(--text);line-height:1.1}
.month-nav{display:flex;align-items:center;gap:8px}
.month-nav-btn{width:32px;height:32px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.month-nav-btn:hover{background:var(--bg4)}
.month-nav-btn svg{width:14px;height:14px}
.month-label{font-size:15px;font-weight:500;color:var(--text);min-width:130px;text-align:center}

.cal-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1.5rem}
.cal-grid-7{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:1.5rem}
.cal-grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:0}
.cal-day-header{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);text-align:center;padding:.5rem 0}
.cal-day-header.weekend{color:rgba(90,112,128,.6)}

.cal-cell{background:var(--bg3);border-radius:var(--rs);border:1px solid var(--border);min-height:120px;padding:.7rem .6rem;transition:border-color .15s;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center}
.cal-cell.empty{background:var(--bg2);border-color:var(--border2)}
.cal-cell.weekend-cell{background:rgba(10,29,46,.6);border-color:var(--border2)}
.cal-cell:not(.empty):not(.weekend-cell):hover{border-color:rgba(200,220,240,.18)}
.cal-cell.today{border-color:var(--gold)!important}
.cal-cell.event-day{cursor:pointer}
.cal-cell.event-day:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.cal-cell.nfz{background:rgba(139,26,26,.15);border-color:rgba(139,26,26,.2)}

.day-num{font-size:15px;font-weight:700;color:var(--text3);margin-bottom:.5rem;display:flex;align-items:center;justify-content:center;gap:6px;text-align:center}
.day-num.has-event{color:var(--text2)}
.day-event-name{font-size:12px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:inherit}
.cal-pill{font-size:12px;font-weight:600;padding:3px 7px;border-radius:4px;margin-bottom:3px;line-height:1.5;display:block;text-align:center}
.cal-nfz{font-size:11px;font-weight:700;color:#FF4444;display:flex;align-items:center;justify-content:center;gap:4px;width:100%;background:rgba(255,68,68,.12);border-radius:4px;padding:3px 6px;margin-bottom:5px;letter-spacing:.03em}

/* Legend */
.cal-legend{display:flex;flex-wrap:wrap;gap:8px;padding:1rem 0;border-top:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-swatch{width:16px;height:8px;border-radius:3px;flex-shrink:0}

/* Month notes */
.month-note{border-radius:var(--rs);padding:.6rem .9rem;margin-bottom:8px;font-size:11px;font-weight:500;line-height:1.5;border-left:3px solid}

/* ── Playbook page ── */
.pb-wrap{padding:2rem 2.5rem}
.pb-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text3);cursor:pointer;margin-bottom:1.75rem;background:none;border:none;padding:0;font-family:"DM Sans",sans-serif;transition:color .15s}
.pb-back:hover{color:var(--text2)}
.pb-hero{background:linear-gradient(135deg,#0A1929 0%,#0D2040 100%);border-radius:var(--r);padding:2rem 2.25rem;margin-bottom:1.75rem;border:1px solid var(--border)}
.pb-eye{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:.5rem}
.pb-name{font-family:"DM Serif Display",serif;font-size:28px;color:#fff;margin-bottom:.3rem}
.pb-dates{font-size:14px;color:rgba(255,255,255,.5)}
.pb-tags{display:flex;gap:6px;margin-top:1rem;flex-wrap:wrap}
.pb-tag{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6)}
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:1.75rem;overflow-x:auto}
.tab-btn{font-size:13px;padding:.6rem 1rem;border:none;background:none;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:"DM Sans",sans-serif;transition:color .15s}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--text);font-weight:500;border-bottom-color:var(--gold)}
.sec-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:.85rem}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.75rem}
.info-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:.85rem 1rem}
.info-label{font-size:11px;color:var(--text3);margin-bottom:3px}
.info-val{font-size:13px;font-weight:500;color:var(--text)}
.card-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:.5rem 1.25rem;margin-bottom:1.25rem}
.row-item{display:flex;align-items:flex-start;gap:12px;padding:.6rem 0;border-bottom:1px solid var(--border2);line-height:1.4}
.row-item:last-child{border-bottom:none}
.p-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;min-width:28px;text-align:center;flex-shrink:0;margin-top:1px}
.row-text{font-size:13px;color:var(--text2)}
.dl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dl-date{font-size:12px;color:var(--text3);font-weight:500;white-space:nowrap;margin-left:auto;padding-left:12px}
.divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0}
.ms-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.25rem;margin-bottom:10px}
.ms-week{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.65rem}
.ms-task{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start;line-height:1.4}
.ms-task:last-child{margin-bottom:0}
.ms-pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;flex-shrink:0;margin-top:1px}
.ms-text{font-size:13px;color:var(--text2)}
.script-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.25rem;margin-bottom:12px;border-left-width:3px;border-left-style:solid}
.script-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem}
.script-text{font-size:13.5px;color:var(--text2);line-height:1.75;font-style:italic}
.script-note{font-size:12px;color:var(--text3);margin-top:.55rem;padding-top:.55rem;border-top:1px solid var(--border)}
.obj-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.25rem;margin-bottom:12px}
.obj-q{font-size:14px;font-weight:500;color:var(--text);margin-bottom:.5rem}
.obj-a{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:.5rem}
.obj-note{font-size:12px;color:var(--text3);padding-top:.5rem;border-top:1px solid var(--border);font-style:italic}
.cl-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:.5rem 1.25rem}
.cl-item{display:flex;gap:12px;padding:.6rem 0;border-bottom:1px solid var(--border2);align-items:flex-start}
.cl-item:last-child{border-bottom:none}
.cl-num{font-size:11px;font-weight:600;color:var(--text3);min-width:18px;margin-top:1px}
.cl-text{font-size:13px;color:var(--text2);line-height:1.4}
.special-box{background:#071422;border-radius:var(--r);padding:1.1rem 1.25rem;margin-bottom:10px;border:1px solid var(--border)}
.sp-title{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.65rem}
.sp-task{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start}
.sp-task:last-child{margin-bottom:0}
.sp-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:6px}
.sp-text{font-size:13px;color:var(--text2);line-height:1.45}
.ev-section{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1.25rem}
.ev-section-body{font-size:13.5px;color:var(--text2);line-height:1.75}
.ev-section-body p{margin-bottom:.7rem}
.ev-section-body p:last-child{margin-bottom:0}
.ev-section-body strong{font-weight:500;color:var(--text)}
.stat-inline{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border-radius:var(--rs);padding:4px 10px;font-size:12px;font-weight:500;color:var(--text)}
.quote-block{border-left:3px solid var(--gold);padding:.75rem 1rem;background:rgba(255,255,255,.04);border-radius:0 var(--rs) var(--rs) 0;margin:1rem 0;font-size:13.5px;color:var(--text2);line-height:1.7;font-style:italic}
.quote-attr{font-size:12px;color:var(--text3);font-style:normal;margin-top:.4rem}

.cal-cell.holiday{background:repeating-linear-gradient(135deg,#0D1822 0px,#0D1822 4px,#0F1F30 4px,#0F1F30 8px)!important;border:1px solid rgba(196,168,255,.15)!important;opacity:.75}
.cal-cell.holiday .day-num{color:rgba(196,168,255,.5)!important}
.cal-cell.holiday .hol-label{font-size:12px;color:rgba(196,168,255,.5);text-align:center;font-style:italic;margin-top:4px;line-height:1.3;width:100%}

.video-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg3);border:1px dashed var(--border);border-radius:var(--r);padding:2.5rem 1.5rem;text-align:center}
.video-placeholder svg{opacity:.3;margin-bottom:.75rem}
.video-placeholder-title{font-size:13px;font-weight:500;color:var(--text3);margin-bottom:.35rem}
.video-placeholder-sub{font-size:12px;color:var(--text3);opacity:.7}


.pb-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:1.25rem 1.5rem;display:flex;align-items:flex-start;justify-content:space-between}
.pb-title{font-size:22px;font-weight:700;color:var(--text);font-family:var(--font-serif);margin:.2rem 0 .3rem}
.pb-body{padding:1.5rem;overflow-y:auto;flex:1}
.back-btn{background:none;border:1px solid var(--border);border-radius:var(--rs);color:var(--text3);font-size:12px;padding:.4rem .85rem;cursor:pointer;white-space:nowrap;margin-top:.25rem;transition:border-color .15s}
.back-btn:hover{border-color:rgba(200,220,240,.25);color:var(--text2)}
</style>
</head>

<p style='font-size:13px;color:var(--text2);line-height:1.65'><strong style='color:var(--text)'>Leadership Academy (2026)</strong> is a 4-day immersive training in NLP, influence, and peak performance leadership led by Joseph McClendon III and six world-class faculty members. <strong style='color:var(--text)'>2026 is the last event in its current format.</strong> The program transitions to the new Leadership Certification structure beginning January 2027. Clients attending in 2026 are completing the foundational experience that the new certification builds upon.</p>`,
    why_show_up:`<ul style='list-style:none;padding:0;margin:0'><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🧠 <strong>NLP trained into the body</strong> over 4 days — not taught, conditioned through real-time immersive practice</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>👥 Clients are placed in <strong>teams</strong> throughout — real leadership practice with live feedback from professionals</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>📋 <strong>6 Human Needs framework</strong> — understand what drives every person's behavior before you say a word</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>👁️ <strong>Jan Hargrave</strong> teaches body language — what your non-verbal communication says before you open your mouth</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🏆 <strong>Siri Lindley</strong> — world champion triathlete — teaches physical and mental toughness as a leadership skill</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🎓 For certification clients: <strong>Program 1 of 3</strong> — Leadership Academy is the foundation of the Leadership Mastery credential</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>💬 Applies to <strong>everyone who influences people</strong> — parents, coaches, sales professionals, managers, partners</li><li style='padding:.45rem 0'>💡 Joseph McClendon III: <em>"Leadership Academy is where Tony's work becomes yours. You leave as a different leader than you arrived."</em></li></ul>`,
    scripts:[
      {label:'Opening',color:'#9B6DFF',text:'"[Client name], welcome — I\'m [Your Name], your Mastery Concierge at Tony Robbins. First — I just want to acknowledge you. Choosing Leadership Academy is a declaration. You\'ve decided that the way you lead yourself and others is going to change. That decision takes courage. And I\'m here to make sure you don\'t just attend this event — you arrive ready to get everything out of it."',note:'Identity-based affirmation. Anchor them to the significance of the decision they already made.'},
      {label:'Program description',color:'#4A2C9E',text:'"Leadership Academy is 4 days built on Tony\'s proven NLP and influence system — the same framework he\'s used to coach presidents and world champions. By day 4 you\'re not just informed — you\'re trained. The difference between knowing NLP and having it wired into your body through 4 days of immersive practice is enormous. You leave a different communicator, a different leader, and a different person than you arrived."',note:"Connect to their specific goals. Don't list features — paint what they'll be able to do differently."},
      {label:'For the "Why isn\'t Tony there?" question',color:'#3C3489',text:'"Joseph McClendon III leads Leadership Academy — he\'s one of the most respected peak performance trainers alive and has co-developed programs with Tony for decades. Tony appears throughout the event via video. And here\'s what clients consistently say: Joseph\'s ability to teach and condition the NLP and influence skills in a live immersive environment is extraordinary. You\'re in incredible hands."',note:"Don't be defensive. McClendon is a genuine strength. Lead with his credibility before they even finish the question."},
      {label:'If voicemail',color:'#26215C',text:'"Hey [Name], this is [Your Name], your Mastery Concierge at Tony Robbins. I\'m calling to get you set up for Leadership Academy and make sure nothing gets in the way of you showing up. Call me back at [number] — I\'ll be efficient with your time."',note:'Under 35 seconds. Text immediately after.'},
    ],
    objections:[
      {q:'"Why isn\'t Tony there in person?"',a:'"Joseph McClendon III leads Leadership Academy — he is one of the world\'s most respected peak performance trainers and has worked alongside Tony for decades. Tony appears throughout via video. Here\'s what matters: the NLP, influence, and peak state skills you\'re going to have trained into your body by day 4 — Joseph is the best in the world at delivering that work in an immersive environment. Clients who\'ve been to both Tony-led and Joseph-led events say Leadership Academy is where they made the most practical skill gains of any event."',note:"Don't be defensive. McClendon is a genuine strength — lean into his expertise, not away from the Tony question."},
      {q:'"I already know NLP."',a:'"That\'s a great foundation — and Leadership Academy will deepen and extend it significantly. There\'s a difference between knowing NLP conceptually and having it trained into your body through 4 days of real-time practice with professional mentors. The application to influencing teams, coaching others in real time, and embedding it into your leadership identity — that\'s what the immersive format delivers. Clients who came in knowing NLP say it was like learning it again, at a completely different level."',note:'Honor their knowledge. Position LA as the embodied version of what they already know intellectually.'},
      {q:'"I\'m not sure this applies to my situation — I\'m not in a formal leadership role."',a:'"Leadership Academy is for anyone who influences other people — which is everyone. Parents lead. Coaches lead. Salespeople lead. Partners in a relationship lead. Tony\'s definition of leadership is: the ability to move people from where they are to where they want to be. If you communicate with human beings, this program makes you exponentially more effective at doing that."',note:'Broaden the definition of leadership before they narrow it to corporate hierarchy.'},
    ],
    days_breakdown:`<div style='border-left:3px solid #9B6DFF;padding:.75rem 1rem;background:rgba(155,109,255,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#9B6DFF;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 1 — Foundation of Leadership and The 6 Human Needs</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Joseph McClendon III opens the event and establishes the team structure. Tony's 6 Human Needs framework is introduced in depth — the foundational lens for understanding every human being's behavior. Clients discover their own primary needs and how those needs have been driving their leadership style. Sid Jacobson introduces NLP principles and the skill of observation.</p></div><div style='border-left:3px solid #9B6DFF;padding:.75rem 1rem;background:rgba(155,109,255,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#9B6DFF;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 2 — NLP, Influence and Non-Verbal Communication</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>The deepest NLP training day. Sid Jacobson leads practical exercises in rapport-building, representational systems, and belief change. Jan Hargrave teaches body language — micro-expressions, gestures, and the non-verbal signals that communicate more than words. All techniques are practiced in real-time team exercises with immediate professional feedback.</p></div><div style='border-left:3px solid #9B6DFF;padding:.75rem 1rem;background:rgba(155,109,255,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#9B6DFF;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 3 — Peak State, Mental Toughness and Identity as a Leader</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Siri Lindley leads the physical and mental toughness sessions — what peak performance looks like in the body and how to access it on demand. Peter Bregman teaches leadership coaching frameworks. The identity work deepens: who you are as a leader, and what the identity of a transformational leader requires you to become.</p></div><div style='border-left:3px solid #9B6DFF;padding:.75rem 1rem;background:rgba(155,109,255,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#9B6DFF;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 4 — Integration, Application and Team Leadership</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Cloe Madanes leads integration workshops where every skill learned over 4 days is applied to real leadership scenarios under pressure. Clients lead teams, coach others, and demonstrate mastery of what they practiced. They leave with a leadership action plan built on specific tools they drilled over 4 days — not theory, execution-ready skills.</p></div>`,

    event_overview:`<p><strong>Business Mastery is Tony Robbins' flagship 5-day business transformation event</strong> — 2,000+ business owners, entrepreneurs, and executives from 50+ countries, working on their actual businesses in real time. This is not a business seminar. It is a working session. Every exercise is applied to the participant's own business — their numbers, their team, their bottlenecks, their growth plan.</p><p>The event is built around <strong>The 7 Forces of Business Mastery</strong>: (1) Business Map, (2) Strategic Innovation, (3) World Class Marketing, (4) Sales Mastery, (5) Financial and Legal Intelligence, (6) Creating Raving Fans, and (7) Optimizing People and Processes. Past faculty have included Peter Diamandis, Jay Abraham, and Keith Cunningham — handpicked by Tony personally.</p><p>Tony offers a <strong>full money-back guarantee after Day 1</strong> — if you don't see $1 million of value you can put back into your business, you get your money back. He has never had to pay it. Average attendee implements changes producing a <strong>30–130% revenue increase within 12 months</strong>.</p><p>Tony's core principle: <em>"Business success is 80% psychology and 20% mechanics."</em> Both are addressed simultaneously over 5 days.</p>`,
    why_show_up:`<ul style='list-style:none;padding:0;margin:0'><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>💰 <strong>Full money-back guarantee after Day 1</strong> — if you don't see $1M of value, you leave with your money back. Tony has never had to pay it</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>📈 Average attendee sees <strong>30–130% revenue increase within 12 months</strong> of attending — per Robbins Research International</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🌍 <strong>2,000+ entrepreneurs from 50+ countries</strong> — the room is the investment as much as the content. The connections last years</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>⏰ <strong>15-hour days</strong> — Tony runs until the group achieves the outcome, not until the schedule says stop</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🏗️ Clients leave with a <strong>complete business growth map</strong> for 12–36 months — built during the event, not as homework</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🎯 The 10-10-10 principle: <strong>10% more customers + 10% higher price + 10% more frequency</strong> = compounding revenue transformation within 90 days</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>👥 Past faculty: <strong>Peter Diamandis, Jay Abraham, Keith Cunningham</strong> — world-class experts handpicked by Tony</li><li style='padding:.45rem 0'>💡 Tony: <em>"The chokehold in your business is probably something you're too close to see clearly. Five days with Tony and 2,000 other entrepreneurs changes that."</em></li></ul>`,
    scripts:[
      {label:'Opening',color:'#3D9EFF',text:'"[Client name], welcome — I\'m [Your Name], your Mastery Concierge at Tony Robbins. I\'m calling because Business Mastery is coming up and I want to make sure you arrive fully prepared and positioned to get the maximum out of 5 days with Tony. Tell me — what\'s the biggest challenge in your business right now?"',note:'Open with a business question. This audience is results-oriented. Get into their world immediately.'},
      {label:'Program description',color:'#1A4F9C',text:'"Business Mastery is where Tony\'s personal development frameworks get applied directly to your business. 2,000+ business owners from 50+ countries. 5 days working on your actual business with Tony and world-class faculty. You leave with a complete growth map and an execution plan. Most clients say they see measurable results within 90 days. It\'s the best investment in my business I\'ve ever made — that\'s not me saying it, that\'s what the attendees say."',note:'Use the social proof of other attendees. The room itself is part of the value.'},
      {label:'If voicemail',color:'#042C53',text:'"Hey [Name], this is [Your Name] from the Tony Robbins Mastery Concierge team. I\'m calling about Business Mastery in August — I want to make sure you\'re set up and ready for 5 days that will change the trajectory of your business. Call me back at [number]."',note:'Under 35 seconds. Lead with the business outcome, not the event logistics.'},
    ],
    objections:[
      {q:'"I can\'t take 5 days away from my business."',a:'"I understand — and I want to offer you a different frame. The clients who say they can\'t afford 5 days away are often the ones who most need what Business Mastery delivers. Tony designed this event to give you 12 months of strategic clarity in 5 days. The question isn\'t whether you can take 5 days away. It\'s whether those 5 days change the next 5 years. Most clients say the ROI shows up within 90 days."',note:'Acknowledge the real cost, then reframe the return in their language.'},
      {q:'"I already run a successful business."',a:'"That\'s exactly who gets the most out of this. Tony works with Fortune 500 CEOs and first-year founders — and the pattern he sees is that success creates blind spots. Business Mastery is where those blind spots get identified and eliminated. The chokehold in your business right now is probably something you\'re too close to see clearly. Five days with Tony and 2,000 other entrepreneurs changes that."',note:'Success is a reason to go, not a reason to skip. The blind spot argument lands well with high performers.'},
      {q:'"Is this just motivational — will it actually help my business?"',a:'"Business Mastery is the opposite of motivational. It\'s operational. You\'re working on your actual business the entire time — your marketing, your sales systems, your cash flow, your team. Tony\'s frameworks are tools, not inspiration. Every attendee builds a complete business map before they leave. This is strategy and execution, not hype."',note:'Differentiate immediately from the perception of Tony as a motivational speaker.'},
    ],
    days_breakdown:`<div style='border-left:3px solid #3D9EFF;padding:.75rem 1rem;background:rgba(61,158,255,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#3D9EFF;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 1 — Business Map and The Owner vs Operator Distinction</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>The most important distinction in business: the difference between an owner and an operator. Most business owners are operators — their time is essentially free, so they never work ON the business. Day 1 breaks this pattern. Clients complete a deep audit of their business map, identify their chokehold, and establish the gap between where they are and where they need to be. The full Day 1 money-back guarantee applies.</p></div><div style='border-left:3px solid #3D9EFF;padding:.75rem 1rem;background:rgba(61,158,255,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#3D9EFF;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 2 — Strategic Innovation and World Class Marketing</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Tony and faculty work through Strategic Innovation and Marketing Mastery (Forces 1–3). Clients identify what makes them genuinely different, who their ideal customer really is, and rebuild their marketing message accordingly. The 10-10-10 principle is introduced — 10% more customers, 10% higher price, 10% more frequency. Compounded, this transforms most businesses within 90 days.</p></div><div style='border-left:3px solid #3D9EFF;padding:.75rem 1rem;background:rgba(61,158,255,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#3D9EFF;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 3 — Sales Mastery and Creating Raving Fans</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Sales psychology and raving fans (Forces 4–5). Tony teaches that selling is not something you do TO someone — it's something you do FOR them. Sales frameworks, objection handling systems, and the mindset shift from transactional to relational selling. Jay Abraham or equivalent faculty present marketing and sales case studies from the real world.</p></div><div style='border-left:3px solid #3D9EFF;padding:.75rem 1rem;background:rgba(61,158,255,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#3D9EFF;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 4 — Financial Intelligence and Legal Protection</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Keith Cunningham's financial intelligence work (Force 6). Most business owners avoid their numbers — this day makes financial literacy visceral and practical. Cash flow optimization, profit margin analysis, and the legal structures that protect everything built. Tony's principle: the business that knows its numbers in real time always wins.</p></div><div style='border-left:3px solid #3D9EFF;padding:.75rem 1rem;background:rgba(61,158,255,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#3D9EFF;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 5 — People, Processes and The Growth Blueprint</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Optimizing people and processes (Force 7) — culture, team building, and systems that scale without the owner as the bottleneck. Every client completes a full Business Growth Blueprint: a written, executable plan for the next 12–36 months built from everything done over 5 days. This is the document clients execute when they get home. Results show up within 90 days.</p></div>`,

    event_overview:`<p><strong>Advanced Business Mastery (ABM) is Tony Robbins' highest-level business event</strong> — built exclusively for business owners who have completed Business Mastery and are ready to apply the framework at scale. This is not a repeat of BM. Business Mastery gives you the system. ABM gives you mastery of the execution at a completely different level of depth and implementation.</p><p>Over 4 days, Tony and world-class faculty work directly with participants to re-engineer their business using the Value Chain analysis, Optimization and Maximization frameworks, and Tony's billion-dollar decision-making system. The goal is explicit: <strong>double growth while removing the owner from the day-to-day</strong>. Participants can bring up to 2 team members so implementation begins inside the event, not after.</p><p>ABM includes <strong>6 one-on-one Results Coaching sessions</strong> to hold participants accountable to the exact plan built during the event. Clients report the event pays for itself within 60 days. Net profitability increases of up to <strong>50% within 60 days</strong> have been reported by attendees.</p>`,
    why_show_up:`<ul style='list-style:none;padding:0;margin:0'><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🚀 The stated goal: <strong>double growth while removing the owner from day-to-day operations</strong> — built into the event structure</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>👥 Bring <strong>up to 2 team members</strong> — implementation begins during the event, not after you get home</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>📞 <strong>6 one-on-one Results Coaching sessions</strong> included — real accountability to the plan built at ABM</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>💰 Clients report the event pays for itself within <strong>60 days</strong> through eliminated inefficiencies and new revenue</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>📈 Net profitability increases of <strong>up to 50% within 60 days</strong> reported by attendees</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🔬 <strong>Value Chain analysis</strong> — every point in the business where value leaks is identified and fixed</li><li style='padding:.45rem 0'>💡 Tony: <em>"ABM is where Business Mastery becomes your business — not a framework you know, but a system you operate."</em></li></ul>`,
    scripts:[
      {label:'Opening',color:'#FF7A40',text:'"[Client name], this is [Your Name] from the Tony Robbins Mastery Concierge team. I\'m calling about Advanced Business Mastery in October. You\'ve already done the foundation work — ABM is where you take that framework and apply it at a completely different level. Tony designed this specifically for business owners who are ready to move from understanding the system to mastering the execution."',note:'Lead with the progression narrative. They\'ve earned this event. Position it as a level-up, not a repeat.'},
      {label:'The ABM difference',color:'#6D4C41',text:'"ABM isn\'t a repeat of Business Mastery. Business Mastery is the system — ABM is where you re-engineer your entire business using it. You come in with your real numbers, your real challenges, your real bottlenecks. Tony works with you directly. The goal is to double your growth and remove you from the day-to-day. Clients report hitting that goal within 60 days of the event."',note:'The most important distinction to make: this is not the same content delivered again.'},
    ],
    objections:[
      {q:'"I just did Business Mastery — is this different enough to justify it?"',a:'"Completely different. Business Mastery is the system — ABM is the application at scale. Think of it as moving from learning the framework to mastering its execution under real business conditions. You\'re working on your actual numbers, your actual team, your actual bottlenecks — in real time with Tony. Clients who\'ve done both say ABM is where Business Mastery actually becomes their business."',note:'Never let them assume this is a repeat. The progression is the entire value proposition.'},
      {q:'"My business is already growing well."',a:'"ABM is specifically designed for businesses that are growing. The frameworks Tony uses at ABM — optimization, maximization, the Value Chain — are most powerful when there\'s already momentum. The goal isn\'t to fix what\'s broken. It\'s to eliminate the inefficiencies that are costing you growth you\'re already in position to capture, and to free you from the day-to-day so the business scales without you as the bottleneck."',note:'Use their growth as the argument for attending, not against it.'},
    ],
    days_breakdown:`<div style='border-left:3px solid #FF7A40;padding:.75rem 1rem;background:rgba(255,122,64,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#FF7A40;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 1 — Advanced Business Audit and Value Chain Analysis</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Tony opens with the advanced business audit — a deep honest assessment of where the business actually is versus where the owner believes it is. The Value Chain analysis identifies every point where value is created, where it leaks, and where compounding improvements will have the greatest impact. Participants work in real time on their actual numbers.</p></div><div style='border-left:3px solid #FF7A40;padding:.75rem 1rem;background:rgba(255,122,64,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#FF7A40;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 2 — Optimization, Maximization and The Scale Decision</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Optimization and Maximization frameworks applied to marketing, sales, and operations simultaneously. Tony teaches the Scale Decision — the specific threshold at which a business operates without its founder in the day-to-day. Critical decisions about team, systems, and infrastructure are made during this session, not as homework.</p></div><div style='border-left:3px solid #FF7A40;padding:.75rem 1rem;background:rgba(255,122,64,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#FF7A40;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 3 — Cash Flow Engineering and Financial Mastery</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Deep financial intelligence at the ABM level. Participants identify the 3 financial levers in their business that produce the fastest results and build a 90-day action plan around them. Cash flow engineering — how to increase revenue, decrease costs, and improve margin simultaneously using real case studies.</p></div><div style='border-left:3px solid #FF7A40;padding:.75rem 1rem;background:rgba(255,122,64,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#FF7A40;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 4 — The Growth Blueprint and Accountability System</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Every decision and plan built over 4 days is synthesized into the ABM Growth Blueprint — a complete written document with clear owners, timelines, and metrics. This is the document the 6 follow-on Results Coaching sessions are built around. Clients leave not just with a plan but with accountability structures already active. Implementation starts on Day 4.</p></div>`,

      {week:'Welcome call window: Nov 16–Dec 16',ou:['Each MC completes welcome calls for their own assigned new buyers — 30-day window','First contact within 48 hours of list assignment','Log all outreach attempts and outcomes in Salesforce after every touchpoint','All calls must be completed by Dec 16'],bd:['No BD support']},
    ],
    event_overview:`<p><strong>Unleash the Power Within (UPW) is Tony Robbins' signature event</strong> — 100 million people across 195 countries, the most proven transformation event in history. It is a 4-day immersive experience built on a single core principle: <strong>information without emotion doesn't stick</strong>. Every element creates the physiological and emotional state where real change becomes inevitable.</p><p>UPW is built around Tony's Triad — the three forces controlling every human state: physiology, focus, and language. Days run 12–15 hours. Tony runs until the room achieves the outcome for that day — not until the schedule says stop.</p><p>The centerpiece of the in-person experience is the <strong>firewalk</strong> — walking barefoot across 2,000-degree red-hot coals at the end of Day 1. Not theater. Physiological proof: when you master your state, you can do what should be impossible. The <strong>Dickens Process</strong> on Day 3 is widely regarded as the single most powerful limiting belief elimination exercise in the entire Tony Robbins portfolio.</p><p>A Stanford University peer-reviewed study found: <strong>159% increase in learning hormones</strong>, <strong>300% improvement in cognitive ability</strong>, and a <strong>139% increase in the testosterone-to-cortisol ratio</strong> — sustained 30 days after the event.</p>`,
    why_show_up:`<ul style='list-style:none;padding:0;margin:0'><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>📊 Stanford: <strong>159% increase in learning hormones</strong>, <strong>300% improvement in cognitive ability</strong> post-event</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>📊 Stanford: <strong>139% increase in testosterone-to-cortisol ratio</strong> — the biochemical marker of peak readiness to perform</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🔥 <strong>The firewalk</strong> proves to the nervous system that fear is not fact — clients report this changes how they face every challenge afterward</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🧠 <strong>The Dickens Process</strong> (Day 3) — the most powerful limiting belief elimination exercise in the Tony Robbins portfolio. Most participants describe it as the most significant single experience of their lives</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🌍 <strong>100 million people across 195 countries</strong> have experienced this program — the most proven transformation event in history</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🎤 Usher: <em>"If you want to change your results, this is where you do it. This is how you do it."</em></li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>💬 Tony: <em>"Pain is inevitable but suffering is optional."</em></li><li style='padding:.45rem 0'>📞 For MCs: the <strong>welcome call is the moment</strong> a ticket purchase becomes a relationship. The MC who shows up for this call with genuine warmth is the reason clients attend every event that follows</li></ul>`,
    scripts:[
      {label:'Welcome call opening',color:'#00D4E8',text:'"[Client name], welcome — I\'m [Your Name], your Mastery Concierge here at Tony Robbins. I\'m calling to welcome you and to make sure you know what you\'ve actually stepped into. You\'ve just joined a community of people who have decided that the way they\'ve been living isn\'t the way they\'re going to keep living. That decision — the one you made when you invested in UPW — that\'s the decision that changes everything."',note:'Warm, celebratory, and identity-anchoring. This is the first impression of the Mastery Concierge relationship — it matters more than any other call.'},
      {label:'What UPW actually is',color:'#007B84',text:'"I want to make sure you know what you\'re walking into, because UPW is different from anything you\'ve experienced. It\'s 4 days. Tony is there personally. You\'re moving your body, you\'re in groups, you\'re doing exercises that rewire how your nervous system responds to fear and limitation. On Day 1 — if you\'re doing the in-person event — you will walk across a bed of hot coals. And you\'ll do it because by that point in the day, Tony will have given you the tools to step through a fear that should stop you. That\'s the proof point. That\'s what UPW delivers."',note:"Paint the firewalk as the symbol of the entire event's promise. It creates anticipation and certainty."},
      {label:'If voicemail',color:'#00B8C8',text:'"Hey [Name], this is [Your Name], your Mastery Concierge at Tony Robbins. I\'m calling to welcome you and set up a quick intro call — you\'ve stepped into something significant and I want to make sure you\'re fully prepared. Call me back at [number]."',note:'Under 35 seconds. Send a text immediately after. One voicemail per channel per week maximum.'},
    ],
    objections:[
      {q:'"What exactly is a Mastery Concierge?"',a:'"Think of me as your dedicated guide through Tony\'s work. My job is to make sure you know what\'s available to you, that you show up for every event fully prepared, and that if anything ever gets in the way — scheduling, logistics, a question about the program — I\'m here to navigate it with you. You paid a significant amount to be part of this journey. I\'m here to make sure that investment delivers everything it\'s capable of delivering."',note:'Define the role with warmth and specificity. Every future interaction depends on how clearly this gets established.'},
      {q:'"I\'ve been to other personal development events and they didn\'t change anything long-term."',a:'"I hear that — and it\'s the most important thing you could have told me. Most personal development events teach you concepts. You take notes, you get inspired, and six weeks later you\'re back to normal. UPW is different because it doesn\'t work at the level of information. It works at the level of your nervous system. Tony uses physiology, movement, language, and what the Stanford researchers called unique physiological and biochemical effects to create change that\'s conditioned into your body. The research shows effects lasting 30+ days. That\'s not motivation. That\'s identity-level transformation."',note:"This is the most powerful objection to land. Don't dismiss their prior experience — validate it, then show the differentiation."},
    ],
    days_breakdown:`<div style='border-left:3px solid #00D4E8;padding:.75rem 1rem;background:rgba(0,212,232,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#00D4E8;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 1 — Turn Fear Into Power and The Firewalk</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Tony opens with the Triad — how physiology, focus, and language control your state in every moment. The day is dedicated to identifying limiting beliefs, understanding how they formed, and beginning to collapse them. Movement, priming sequences, and state-change exercises run continuously. The day ends with the Firewalk at midnight: 2,000-degree red-hot coals walked barefoot by participants who 12 hours earlier thought it was impossible. The firewalk is the proof of everything Day 1 teaches.</p></div><div style='border-left:3px solid #00D4E8;padding:.75rem 1rem;background:rgba(0,212,232,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#00D4E8;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 2 — Momentum and The Ultimate Success Formula</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Day 2 builds on the breakthroughs of Day 1. Tony teaches the Ultimate Success Formula — the consistent pattern behind every lasting achievement. The Wheel of Life exercise reveals where each participant's life is out of balance and what that imbalance is costing them. The day is about translating the energy of Day 1 into direction, clarity, and momentum.</p></div><div style='border-left:3px solid #00D4E8;padding:.75rem 1rem;background:rgba(0,212,232,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#00D4E8;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 3 — The Dickens Process: Transformation Day</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>The most emotionally intense and transformative day of the event. The Dickens Process takes participants through their top 3 limiting beliefs — projecting them forward 5, 10, 20 years to make the pain of not changing visceral and immediate. Then Tony guides the rebuilding — new empowering beliefs installed with the same intensity. Most participants describe Day 3 as the most significant experience of their lives. The day ends with the chant: "Now I Am The Voice. I will lead, not follow. I will believe, not doubt."</p></div><div style='border-left:3px solid #00D4E8;padding:.75rem 1rem;background:rgba(0,212,232,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#00D4E8;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 4 — Pure Energy, Vitality and Integration</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Joseph McClendon III leads Day 4 — physical vitality, nutrition, and the daily rituals that sustain peak energy long after the event. Tony's integration framework helps clients build their compelling future across all life areas. The Stanford effects are now in the body. Day 4 is about making them permanent through the daily ritual stack Tony teaches for 30, 60, and 90 days post-event.</p></div>`,

    event_overview:`<p><strong>Date with Destiny (DWD) is Tony Robbins' most transformational event and his personal favorite.</strong> He has been running it since 1988 and calls it "the crème de la crème." The Netflix documentary <em>I Am Not Your Guru</em> is filmed entirely at DWD — recommend it to every client who is on the fence.</p><p>DWD is a 6-day deep immersion into the foundational forces shaping every human life: values, beliefs, identity, purpose, and relationships. The curriculum covers the 6 Human Needs (deep immersion), Values and Rules System redesign, Beliefs and Identity transformation, Primary Question discovery and replacement, a full Relationship Day co-facilitated by Tony and Sage Robbins, Life Mission and Purpose design, and a complete 12–36 month life vision. Every module builds on the previous one. By Day 6, clients have redesigned every foundational element of how they think, feel, and operate.</p><p>In-person DWD is at the <strong>Palm Beach Convention Center</strong>. Days run 12+ hours — Tony runs until the group achieves the outcome. The Leadership Mastery track runs concurrently for 3 days for clients applying the work in a leadership context.</p><p><strong>The Stanford research:</strong> 100% of depressed participants in full remission 30 days after DWD, average improvement 87.2%. 50% increase in positive emotions. 70% reduction in negative emotions. The researchers ran the numbers three times. No drugs. Six days.</p>`,
    why_show_up:`<ul style='list-style:none;padding:0;margin:0'><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>📊 Stanford: <strong>100% of depressed participants in full remission 30 days after DWD</strong> — average improvement 87.2%</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>📊 Stanford: <strong>50% increase in positive emotions</strong> — life satisfaction, inner strength, well-being</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>📊 Stanford: <strong>70% reduction in negative emotions</strong> — loneliness, sadness, anger, stress, anxiety</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>📊 Stanford: DWD participants showed a <strong>significant reduction in anxiety during COVID</strong> vs a 28% increase in non-attendees</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🎬 The Netflix documentary <em>I Am Not Your Guru</em> is filmed at DWD — <strong>recommend it to every undecided client before the call ends</strong></li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>💍 Tony and Sage Robbins co-facilitate a <strong>full day on relationships</strong> — couples who attend together call it the best relationship work they have ever done</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🏆 Jeff Arch (Academy Award nominee, Sleepless in Seattle): <em>"A month after DWD, I wrote Sleepless in Seattle and sold it for a quarter of a million dollars."</em></li><li style='padding:.45rem 0'>💡 Tony: <em>"This is where you get to the source of pain and suffering in your life and you change it — and that change is not only lasting, but backed by science."</em></li></ul>`,
    scripts:[
      {label:'Opening — new client',color:'#FF4DB8',text:'"[Client name], welcome — this is [Your Name] from the Tony Robbins Mastery Concierge team. I\'m calling because you\'ve stepped into Tony\'s most transformational event. Date with Destiny is where people redesign their entire life — not tweak it, not optimize it — redesign it from the foundation up. Values, beliefs, identity, purpose, relationships. Six days with Tony personally. I want to make sure you arrive fully prepared for what this is going to be."',note:'New clients need context. Paint what DWD actually is before any logistics.'},
      {label:'Opening — returning client',color:'#880E4F',text:'"[Client name], welcome back — I\'m [Your Name], your Mastery Concierge. You\'re going back to Date with Destiny and I want to know: what\'s different this time? Where are you now versus where you were when you first went? Because that\'s what we\'re going to build on — and the research shows that returning clients consistently experience a deeper transformation the second time than the first."',note:"Reference their history. Returning clients are primed — use their prior experience as the foundation for the conversation."},
      {label:'Stanford research drop',color:'#AD1457',text:'"I want to share something with you that Stanford University published on DWD, because when you hear it you\'ll understand why this event is different. They ran the numbers three times because they couldn\'t believe what they found. 100% of participants who were depressed before the event were in remission 30 days after. 50% increase in positive emotions. 70% reduction in negative emotions. No drugs. Six days. This is not personal development — this is documented physiological transformation."',note:'The Stanford data is your most powerful asset in this conversation. Deliver it with certainty and pause to let it land.'},
      {label:'If voicemail',color:'#7B1041',text:'"Hey [Name], this is [Your Name], your Mastery Concierge at Tony Robbins. I\'m calling about Date with Destiny in December — I want to make sure we connect before the event so you arrive fully prepared for 6 days with Tony. Call me back at [number]."',note:'Under 35 seconds. Follow up with a text immediately.'},
    ],
    objections:[
      {q:'"6 days is too long of a commitment."',a:'"Six days is a real commitment — and that\'s exactly why the transformation is so deep. Tony runs each day until the group achieves the outcome, not until the schedule says it\'s over. The Stanford research showed that 100% of participants who were depressed before DWD were in full remission 30 days after. No drugs. Six days. The length isn\'t overhead — it\'s the mechanism. The depth of the transformation is directly proportional to the depth of the immersion."',note:'Connect intensity directly to depth of result. Use the Stanford data every time.'},
      {q:'"I\'ve already been to DWD — do I need to go again?"',a:'"The clients who\'ve been to DWD before say the second time is more transformational than the first. And if you\'re on the leadership track this time — you\'re not there as a participant. You\'re there as someone applying the work, leading teams, going deeper into the content as someone who delivers it. That\'s a fundamentally different experience. You\'re not repeating DWD. You\'re graduating into it."',note:'Distinguish the returning participant experience from the leadership track clearly.'},
      {q:'"My partner isn\'t sure about attending."',a:'"Tony does an entire day on relationships — co-facilitated by him and Sage Robbins. Couples who attend together consistently say it\'s the most powerful relationship work they\'ve ever done. The research shows participants report feeling happier and more satisfied in their relationships after the event. You don\'t need to convince your partner of the whole program. Just ask them: would you want to do the best relationship work available alongside the person you love most?"',note:'Use the relationship day as the bridge. The question at the end is the close.'},
      {q:'"I watched I Am Not Your Guru and it looked intense."',a:'"It is intense — and that\'s why it works. What you\'re seeing in that documentary is real. Those are real people in real moments of transformation that Tony is facilitating in real time. The intensity isn\'t manufactured. It\'s the result of going to the actual source of pain and changing it — not managing it, not coping with it, changing it. If the documentary moved you, imagine being in that room."',note:"Use the documentary as the bridge, not a barrier. If it moved them, that's the invitation."},
    ],
    days_breakdown:`<p style='font-size:12px;color:var(--text3);margin-bottom:1rem;font-style:italic'>Each day builds on the one before. By Day 6 every foundational element of how a client thinks, feels, and operates has been redesigned.</p><div style='border-left:3px solid #FF4DB8;padding:.75rem 1rem;background:rgba(255,77,184,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#FF4DB8;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 1 — The 6 Human Needs and Your Primary Question</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Tony opens with the 6 Human Needs — the deepest framework for understanding every human's behavior including your own. Participants discover which needs are driving their life and the "Primary Question" — the unconscious question their brain asks every moment that shapes every experience they have. Discovering and replacing the Primary Question is often described as the most significant insight of the entire 6 days.</p></div><div style='border-left:3px solid #FF4DB8;padding:.75rem 1rem;background:rgba(255,77,184,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#FF4DB8;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 2 — Values, Beliefs and The Blueprint</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>The values and rules system — the invisible blueprint governing every decision. Tony helps participants identify their values hierarchy, discover where their rules for feeling good are impossible or self-defeating, and rebuild both. Beliefs are examined through Tony's belief change process. What you believe about yourself, others, and life determines every outcome you create.</p></div><div style='border-left:3px solid #FF4DB8;padding:.75rem 1rem;background:rgba(255,77,184,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#FF4DB8;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 3 — Identity, Purpose and Mission</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Who are you at your core — beneath the roles, the stories, and the patterns? Tony guides participants through defining their life mission. This is the day that produces the interventions shown in the Netflix documentary I Am Not Your Guru. It is the most emotionally intense day of DWD.</p></div><div style='border-left:3px solid #FF4DB8;padding:.75rem 1rem;background:rgba(255,77,184,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#FF4DB8;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 4 — Relationship Day with Tony and Sage Robbins</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>The most intimate day of DWD. Tony and Sage Robbins co-facilitate an entire day dedicated to love, intimacy, and the architecture of extraordinary relationships. Couples who attend together consistently call this the most valuable relationship work they have ever done. Stanford participants reported feeling happier and more satisfied in their relationships one month after the event.</p></div><div style='border-left:3px solid #FF4DB8;padding:.75rem 1rem;background:rgba(255,77,184,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#FF4DB8;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 5 — Emotional Mastery and The Compelling Future</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Emotional Mastery — tools to access any state, eliminate destructive patterns, and build an emotional foundation that serves your vision. Tony guides participants through building their Compelling Future — a 12, 24, and 36-month vision across every major life area, fully aligned with the values, beliefs, and identity redesigned over the previous 4 days.</p></div><div style='border-left:3px solid #FF4DB8;padding:.75rem 1rem;background:rgba(255,77,184,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#FF4DB8;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 6 — Consciously Decide Your New Destiny</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>The final day integrates everything built over 5 days. Clients complete their Destiny Blueprint and make the final commitment to the person they have chosen to become. This is the day people leave as different people than they arrived. The Stanford effects are now locked in. Day 6 is the moment the new identity becomes the identity.</p></div>`,
        checklist:['Pull DWD + DWDL open unknown lists — treat as separate tracks','Check DWD + DWL combined bucket — clear weekly throughout entire campaign','Determine if client is new to DWD or returning — different scripts for each','Confirm leadership track enrollment if applicable','Check UILI expiry dates for UILI clients','Prepare Stanford research stats — have them ready to deliver with certainty','Recommend the Netflix documentary "I Am Not Your Guru" for new clients','Check DWDL balance due list as a separate and distinct responsibility',
      'Confirm client address — update Salesforce if changed',
      'Confirm all contact details are current in Salesforce']

    event_overview:`<p><strong>Life Mastery is Tony Robbins' 4-day immersive health and vitality transformation</strong> led by Tony and an elite team of world-class wellness, nutrition, and psychology experts. This is not a passive wellness seminar — clients move their bodies, follow a guided nutritional cleanse, and experience emotional and relationship breakthroughs every day. The program is built on 40+ years of Tony's personal health research and is designed to deliver lasting physiological and psychological change, not inspiration that fades.</p><p>The program runs on <strong>Tony's 3 Mandates of Lasting Health</strong>: Stop the Poisoning, Cleanse and Detoxify, and Revitalize and Regenerate. These become lived experiences, not concepts on a slide. Clients who expect a health seminar are often most moved by the emotional and relationship breakthroughs they didn't see coming.</p><p>Life Mastery covers <strong>5 core content areas</strong>: Emotional Mastery, Relationship Mastery, Time and Life Mastery (Tony's RPM system), The 12 Master Principles of a Vital Life, and a Daily Integration Plan. It is entirely virtual — clients attend from home, follow the cleanse in their own kitchen, and do the work in the real context of their actual life. This amplifies the transformation rather than limiting it.</p><p>Tony says: <em>"Health is the foundation of everything. If you prioritize your health now, you will be investing in your future success."</em></p>`,
    why_show_up:`<p><strong>Quick facts your MC can drop into any call:</strong></p><ul style='list-style:none;padding:0;margin:0'><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>📊 <strong>Stanford research: 50% increase in positive emotions</strong> — life satisfaction, inner strength, well-being — sustained 30+ days post-event</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>📊 <strong>Stanford research: 70% reduction in negative emotions</strong> — loneliness, sadness, anger, stress, anxiety</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🏠 <strong>Fully virtual</strong> — no travel, no hotel, no logistics. The transformation happens at home, in real life</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🌿 Clients follow a <strong>guided nutritional cleanse</strong> — Tony's nutrition experts guide every step</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🧠 <strong>5 content areas:</strong> Emotional Mastery, Relationship Mastery, Time and Life Mastery (RPM), 12 Master Principles, Daily Integration Plan</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>🔥 <strong>The clients who feel least ready consistently report the biggest breakthroughs</strong> — that feeling is the reason to go, not a reason to wait</li><li style='padding:.45rem 0;border-bottom:1px solid rgba(200,220,240,.08)'>⚠️ For UILI clients: not showing up means <strong>repurchasing at today's rate</strong> — the ticket they already paid for expires unused</li><li style='padding:.45rem 0'>💡 Tony: <em>"Health is the foundation of everything. If you prioritize your health now, you will be investing in your future success."</em></li></ul>`,
    scripts:[
      {label:'Opening',color:'#00C896',text:'"[Client name], welcome — I\'m so glad we\'re connected. I\'m [Your Name], your Mastery Concierge here at Tony Robbins. Before anything else, I want to acknowledge the decision you made when you purchased Life Mastery. That decision said: I\'m worth investing in. I\'m committed to my health. That decision deserves to be honored — and that\'s exactly what we\'re going to do on this call."',note:'Warm, celebratory tone. Anchor them to the identity of the decision they already made — not the logistics of scheduling.'},
      {label:'Event description',color:'#1A7A5E',text:'"Life Mastery is 4 days that will completely change your relationship with your body, your energy, and your life. It\'s not a seminar where you sit and take notes. You\'re moving, you\'re doing the cleanse, you\'re doing the exercises. By day 4, the research shows a 50% increase in positive emotions and 70% reduction in negative emotions — effects that last months. Tony\'s been doing this work for 40 years. There is nothing else like it."',note:"Use the Stanford data with confidence. The science is the differentiator from every other health event they've seen."},
      {label:'UILI urgency',color:'#FF4444',text:'"[Name], I need to make sure you know something important. Your Life Mastery ticket has a use-it-or-lose-it deadline — it expires with the [date] event. If we don\'t get you registered before that date, you\'d need to repurchase at today\'s rate. I want to protect the investment you\'ve already made. Can we lock in your spot right now?"',note:'Lead with protection of their investment, not pressure. They already said yes when they purchased — you\'re helping them follow through.'},
      {label:'Virtual format reframe',color:'#0F6E56',text:'"The virtual format is actually one of the most powerful aspects of Life Mastery. You attend from home — no travel, no hotel, no logistics. And what\'s remarkable is that clients who do the virtual program often say it\'s more intimate than in-person because they\'re in their own environment doing the cleanse, doing the work in their actual life. The transformation isn\'t somewhere else. It\'s happening right where you live."',note:'Never position virtual as the lesser option. Virtual = doing the work in the real context of your life, which amplifies the transformation.'},
      {label:'If voicemail',color:'#085041',text:'"Hey [Name], this is [Your Name] from the Tony Robbins Mastery Concierge team. I\'m calling to make sure your Life Mastery ticket gets used — it has a use-it-or-lose-it deadline and I want to make sure we protect the decision you\'ve already made. Please call me back at [number] or reply to this message. I\'ll be brief, I promise."',note:'Under 35 seconds. Send a follow-up text immediately. One voicemail per channel per week maximum.'},
    ],
    objections:[
      {q:'"I\'ve been holding out for Fiji in-person."',a:'"I love that you want the full Fiji experience — that is worth wanting, and I\'m not going to try to talk you out of it. Here\'s the thing: clients who do the virtual program first consistently say it made the Fiji experience more powerful, not less. Virtual is the preparation that deepens the live event. And if your ticket expires before you get to Fiji, you\'d need to repurchase just to get there. Let\'s protect your path to Fiji, not compromise it."',note:'Never position virtual as lesser. Reframe: virtual is the bridge to Fiji, not the alternative.'},
      {q:'"I don\'t have time right now — life is too full."',a:'"I hear you — and I want to offer a perspective that\'s come from working with a lot of Life Mastery clients. The feeling that life is too full, that there\'s no space for this right now? That\'s not a barrier to Life Mastery. That\'s the exact reason to go. Tony built this program for people who are running on fumes and need a reset. It\'s 4 days from home. No travel. And the research shows the energy and clarity that come out of it last for months. The question is: can you afford to wait?"',note:'Acknowledge the real pressure of their schedule. Then reframe: busyness is the symptom Life Mastery treats.'},
      {q:'"I\'m not in the right headspace for it right now."',a:'"Tony built Life Mastery specifically for moments like this. Readiness is a result of the program — not a prerequisite for it. The clients who arrive feeling least ready consistently report the biggest shifts. The headspace you\'re describing isn\'t a reason to wait. It\'s a reason to go. What would it mean for your life if you came out of 4 days feeling the way you felt when you first invested in this?"',note:"The wrong headspace IS the reason to go. Don't accept it as a valid barrier."},
      {q:'"I need to talk to my partner about it."',a:'"Absolutely — I love that you make decisions together. Here\'s what I\'d suggest giving them: it\'s 4 days from home. Virtual. No travel, no hotel, no time away from the family. The ticket is already purchased — this isn\'t a new financial decision. It\'s using what you\'ve already invested in. The conversation is: \'I\'m going to show up for something I already said yes to.\' That\'s an easy yes."',note:"Give them the exact frame for the partner conversation. The easier their job, the faster the close."},
      {q:'"I\'ve done personal development before and it didn\'t stick."',a:'"That\'s actually the most important thing you could have told me. Most personal development events teach you concepts. Tony\'s methodology is different — it conditions change at a physiological level. The Dickens Process, the movement, the cleanse — these aren\'t ideas you write down and forget. They\'re wired into your nervous system. Stanford research confirms that the effects persist 30+ days after the event. Life Mastery isn\'t a motivational seminar. It\'s a rewiring."',note:'Differentiate Tony\'s embodied methodology from lecture-based learning. The Stanford data is your evidence.'},
    ],
    days_breakdown:`<p style='font-size:12px;color:var(--text3);margin-bottom:1rem;font-style:italic'>Use this to speak knowledgeably about what clients will actually experience. The more vividly you can describe each day, the more real the event becomes on the call.</p><div style='border-left:3px solid #00C896;padding:.75rem 1rem;background:rgba(0,200,150,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#00C896;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 1 — Foundation and Physiology</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Tony opens with the science of energy — how physiology controls psychology. Clients learn the 3 Mandates of Lasting Health and begin the nutritional cleanse. Movement, breathwork, and state-management exercises run throughout. The day ends with an immersive peak state experience that sets the tone for everything that follows. Clients feel the difference between knowing about health and actually living it.</p></div><div style='border-left:3px solid #00C896;padding:.75rem 1rem;background:rgba(0,200,150,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#00C896;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 2 — Emotional and Relationship Mastery</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Tony works through Emotional Mastery and Relationship Mastery. Many clients describe this as the most unexpected and powerful day — they came for physical health and discovered the emotional patterns that were undermining it. Deep group exercises, partner work, and guided visualization. The cleanse continues. Breakthroughs in relationships are common.</p></div><div style='border-left:3px solid #00C896;padding:.75rem 1rem;background:rgba(0,200,150,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#00C896;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 3 — Time, Life Mastery and The 12 Master Principles</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>Tony introduces his RPM system — the time and life management framework used by his highest performers. The 12 Master Principles of a Vital Life are taught and practiced. Clients build their personal vitality framework. Guest wellness experts present alongside Tony.</p></div><div style='border-left:3px solid #00C896;padding:.75rem 1rem;background:rgba(0,200,150,.06);border-radius:0 8px 8px 0;margin-bottom:10px'><strong style='color:#00C896;font-size:11px;text-transform:uppercase;letter-spacing:.06em'>Day 4 — Daily Integration and Compelling Future</strong><p style='font-size:13px;color:var(--text2);margin-top:.4rem;line-height:1.65'>The final day is about permanence. Tony guides clients through building their Daily Integration Plan — the rituals, habits, and practices that ensure Life Mastery doesn't stay at Life Mastery. Clients leave with a clear written system for maintaining their transformation. The Stanford data confirms the effects last 30+ days. The Integration Plan is how they last a lifetime.</p></div>`,
        checklist:['Review client ticket status and confirm UILI expiry date if applicable','Pull Salesforce record — confirm email, phone, contact preferences, and any previous Tony events','Note their stated reasons for purchasing — reconnect them to their WHY on the call','Confirm event format (virtual or in-person) and have event date ready','Review balance due status and amount owed if applicable','Prepare UILI expiry talking points if deadline is approaching','Have the Stanford research stats ready: 50% increase positive emotions, 70% reduction negative emotions',
      'Confirm client address — update Salesforce if changed',
      'Confirm all contact details are current in Salesforce']
  },
