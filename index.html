    event_overview:`<p>Business Mastery January 2027 is the same high-intensity 5-day business transformation event as August — 2,000+ entrepreneurs from 50+ countries, Tony's 7 Forces of Business Mastery framework, world-class faculty, and an executable growth plan built in the room. The January timing makes this edition uniquely powerful: clients are setting the strategic direction for the entire year within the first 3 weeks of it.</p>
    <p>Tony's principle that success is 80% psychology and 20% strategy is never more relevant than at the start of a new year, when resolutions fade and patterns reassert. Business Mastery January gives clients the tools, the accountability, and the community to ensure that the clarity of January doesn't disappear by February.</p>`,
    why_show_up:`<p>January is the most strategically powerful time to attend Business Mastery. The direction you set in the first 2 weeks of a year determines the trajectory of the next 50 weeks. Clients who attend Business Mastery in January consistently say it compresses months of strategic work into 5 days — and the results show up within 90 days.</p>
    <div class="quote-block">"Tony Robbins and his strategies and tools have been at the core of our culture from the beginning."<span class="quote-attr">— Business Mastery alumnus</span></div>`,
    scripts:[
      {label:'Opening',color:'#40B8FF',text:'"[Client name], welcome — I\'m [Your Name], your Mastery Concierge at Tony Robbins. I\'m calling about Business Mastery in January. I know this time of year is full of competing demands — I\'ll respect your time. But I want to make sure you understand what 5 days with Tony in the first two weeks of January can do for the next 50 weeks of your year."',note:'Acknowledge the holiday/year-end timing. Be efficient. Then anchor to the January strategic advantage immediately.'},
      {label:'January reframe',color:'#2E6580',text:'"January is actually the most powerful time to do Business Mastery. You\'re setting the strategic direction for the entire year in real time. Most people spend January trying to recreate the clarity they felt on December 31st. Business Mastery gives you a framework, a growth map, and 2,000+ accountability partners going into the year. The clients who attend in January say they hit their Q1 targets faster than any other year."',note:'Lead with January as a strategic advantage, not a scheduling challenge.'},
    ],
    objections:[
      {q:'"I can\'t take time off in January — it\'s the busiest time of year."',a:'"January being busy is the exact reason to go. You\'re setting patterns, habits, and direction in January that will define the rest of your year. Business Mastery in January gives you the clarity, strategy, and psychology to make sure those patterns serve your goals — not undermine them. The clients who say they can\'t afford 5 days away in January are often the ones who most need what those 5 days deliver."',note:'Flip January busyness into the argument for going, not against it.'},
    ],
    days_breakdown:`<p style="font-size:12px;color:rgba(168,184,200,.6);margin-bottom:1rem;font-style:italic">Tony does not distribute a curriculum in advance. The following reflects the known structure from attendee reviews and official program materials.</p>\n<div style="border-left:3px solid #40B8FF;padding:.75rem 1rem;background:rgba(61,158,255,.06);border-radius:0 8px 8px 0;margin-bottom:10px"><strong style="color:#40B8FF;font-size:11px;text-transform:uppercase;letter-spacing:.06em">Day 1 — Business Map & The Owner vs. Operator Distinction</strong><p style="font-size:13px;color:rgba(168,184,200,.85);margin-top:.4rem;line-height:1.65">Tony opens with the most important distinction in business: the difference between an owner and an operator. Most business owners are operators — their time is essentially free, which means they never work ON the business. Day 1 breaks this pattern. Clients complete a deep audit of their current business map, identify their chokehold, and establish the gap between where they are and where they need to be. The Day 1 money-back guarantee applies — if you don't see $1M of value, you leave with your money.</p></div>\n<div style="border-left:3px solid #40B8FF;padding:.75rem 1rem;background:rgba(61,158,255,.06);border-radius:0 8px 8px 0;margin-bottom:10px"><strong style="color:#40B8FF;font-size:11px;text-transform:uppercase;letter-spacing:.06em">Day 2 — Strategic Innovation & Marketing Mastery</strong><p style="font-size:13px;color:rgba(168,184,200,.85);margin-top:.4rem;line-height:1.65">Tony and guest faculty work through Strategic Innovation (Forces 1–2) and World Class Marketing (Force 3). Clients identify what makes them genuinely different, who their ideal customer really is, and rebuild their marketing message to speak directly to that customer's needs. The 10-10-10 principle: 10% more customers, 10% higher price, 10% more frequency — compounded, this transforms most businesses within 90 days.</p></div>\n<div style="border-left:3px solid #40B8FF;padding:.75rem 1rem;background:rgba(61,158,255,.06);border-radius:0 8px 8px 0;margin-bottom:10px"><strong style="color:#40B8FF;font-size:11px;text-transform:uppercase;letter-spacing:.06em">Day 3 — Sales Mastery & Raving Fans</strong><p style="font-size:13px;color:rgba(168,184,200,.85);margin-top:.4rem;line-height:1.65">Sales psychology and the art of creating raving fans (Forces 4–5). Tony teaches that selling is not something you do TO someone — it's something you do FOR them. Clients learn Tony's sales frameworks, objection handling systems, and the mindset shift from transactional to relational selling. Jay Abraham or equivalent faculty often appear on this day to present marketing and sales case studies.</p></div>\n<div style="border-left:3px solid #40B8FF;padding:.75rem 1rem;background:rgba(61,158,255,.06);border-radius:0 8px 8px 0;margin-bottom:10px"><strong style="color:#40B8FF;font-size:11px;text-transform:uppercase;letter-spacing:.06em">Day 4 — Financial Intelligence & Legal Protection</strong><p style="font-size:13px;color:rgba(168,184,200,.85);margin-top:.4rem;line-height:1.65">Keith Cunningham's financial intelligence work is a cornerstone of this day (Force 6). Most business owners avoid their numbers — this day makes financial literacy visceral and practical. Tony teaches: the business that knows its numbers in real time always wins. Cash flow optimization, profit margin analysis, and the legal structures that protect everything you've built.</p></div>\n<div style="border-left:3px solid #40B8FF;padding:.75rem 1rem;background:rgba(61,158,255,.06);border-radius:0 8px 8px 0;margin-bottom:10px"><strong style="color:#40B8FF;font-size:11px;text-transform:uppercase;letter-spacing:.06em">Day 5 — People, Processes & The Growth Blueprint</strong><p style="font-size:13px;color:rgba(168,184,200,.85);margin-top:.4rem;line-height:1.65">The final force: optimizing people and processes (Force 7). Culture, team building, and systems that scale without the owner as the bottleneck. Every client completes a full Business Growth Blueprint — a written, executable plan for the next 12–36 months built from everything done over 5 days. This is the document that clients take home and execute. The results show up within 90 days.</p></div>`,

function addDay(map,dateStr,val){if(!map[dateStr])map[dateStr]=[];map[dateStr].push(val)}
function toKey(yr,mo,d){return `${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`}

const WEEK_DAYS_5=['Monday','Tuesday','Wednesday','Thursday','Friday'];
const WEEK_DAYS_7=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function renderCalendar(){
  const {yr,mo,name} = MONTHS[calMonth];
  const dim = daysInMonth(yr,mo);
  const fd  = firstDay(yr,mo); // 0=Mon
  const notes = MONTH_NOTES[`${yr}-${mo}`]||[];
  const showWeekend = true;
  const cols = 7;
  const dayLabels = WEEK_DAYS_7;

  let h = `<div class="cal-wrap">
  <div class="cal-header">
    <div class="cal-title-block">
      <div class="cal-eye">MC Team · Mastery Events</div>
      <div class="cal-title">${name}</div>
    </div>
    <div class="month-nav">
      <button class="month-nav-btn" id="prevMonth"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div class="month-label">${name}</div>
      <button class="month-nav-btn" id="nextMonth"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
  </div>`;

  // Month notes
  notes.forEach(n=>{
    h+=`<div class="month-note" style="background:${n.light}18;border-color:${n.color};color:${n.color}">⚠️ ${n.text}</div>`;
  });

  // Day headers
  h+=`<div class="cal-grid-7">`;
  dayLabels.forEach((d,i)=>{
    h+=`<div class="cal-day-header${i>=5?' weekend':''}">${d}</div>`;
  });
  h+=`</div><div class="cal-grid-7">`;

  // Empty cells before first day
  for(let i=0;i<fd;i++){
    h+=`<div class="cal-cell empty"></div>`;
  }

  // Day cells
  for(let d=1;d<=dim;d++){
    const dt = new Date(yr,mo-1,d);
    const dow = dt.getDay(); // 0=Sun,6=Sat
    const isWeekend = dow===0||dow===6;
    const dateStr = toKey(yr,mo,d);
    const evDays  = EVT_DAYS[dateStr]||[];
    const nfzInfo = NFZ_DAYS[dateStr]||[];
    const dls     = DL_DAYS[dateStr]||[];
    const isNFZ   = nfzInfo.length>0 && evDays.length===0;
    const hasEvent= evDays.length>0;
    const hasDL   = dls.length>0;

    const isHoliday = dls.some(d=>d.light==='#HOLIDAY');
    let cls='cal-cell';
    if(isWeekend) cls+=' weekend-cell';
    if(hasEvent)  cls+=' event-day';
    if(isNFZ)     cls+=' nfz';
    if(isHoliday) cls+=' holiday';

    let evId = hasEvent ? evDays[0].id : (hasDL ? dls[0].evId : null);
    let clickAttr = evId ? `data-ev="${evId}"` : '';

    // Color strip at top for event days
    let topStrip = '';
    if(hasEvent){
      const ev = evDays[0];
      topStrip = `<div style="position:absolute;top:0;left:0;right:0;height:3px;background:${ev.color};border-radius:var(--rs) var(--rs) 0 0"></div>`;
    } else if(isNFZ){
      topStrip = `<div style="position:absolute;top:0;left:0;right:0;height:3px;background:#FF2D2D;border-radius:var(--rs) var(--rs) 0 0"></div>`;
    }

    h+=`<div class="${cls}" ${clickAttr}>
      ${topStrip}
      <div class="day-num${hasEvent||hasDL?' has-event':''}">
        <span style="color:${hasEvent?evDays[0].color:isNFZ?'#FF6B6B':''};">${d}</span>
        ${hasEvent?`<span class="day-event-name" style="color:${evDays[0].color}">${evDays[0].short||evDays[0].name}</span>`:''}
      </div>`;

    // NFZ banner — always first, full width
    if(isNFZ){
      h+=`<div class="cal-nfz"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>NO FLY ZONE</div>`;
    }

    // Deadline pills — below NFZ
    if(isHoliday){
      const hol = dls.find(d=>d.light=='#HOLIDAY');
      if(hol) h+=`<div class="hol-label">${hol.label.replace('🏛 ','')}</div>`;
      // Show any non-holiday pills that share the day
      dls.filter(d=>d.light!=='#HOLIDAY').slice(0,2).forEach(dl=>{
        h+=`<span class="cal-pill" style="background:${dl.light}25;color:${dl.color}">${dl.label}</span>`;
      });
    } else {
      dls.slice(0,3).forEach(dl=>{
        h+=`<span class="cal-pill" style="background:${dl.light}25;color:${dl.color}">${dl.label}</span>`;
      });
      if(dls.length>3) h+=`<span class="cal-pill" style="background:rgba(255,255,255,.05);color:var(--text3)">+${dls.length-3} more</span>`;
    }

    h+=`</div>`;
  }

  // Remaining empty cells to complete grid
  const totalCells = fd + dim;
  const remainder  = totalCells % 7;
  if(remainder!==0){
    for(let i=0;i<7-remainder;i++){
      h+=`<div class="cal-cell empty"></div>`;
    }
  }

  h+=`</div>`;

  // Legend
  h+=`<div class="cal-legend">`;
  E.forEach(ev=>{
    const DATES2={lm26:'Jun 25',la26:'Jul 25',bm26:'Aug 12',abm26:'Oct 15',upwnov:'Nov 5',dwd26:'Dec 4',bm27:'Jan 13',upwmar:'Mar 18',lm27:'Apr 22'};
    h+=`<div class="legend-item"><div class="legend-swatch" style="background:${ev.color}"></div>${ev.name} ${DATES2[ev.id]||''}</div>`;
  });
  h+=`<div class="legend-item"><div class="legend-swatch" style="background:#FF2D2D;opacity:.7"></div>No fly zone</div>`;
  h+=`<div class="legend-item"><div class="legend-swatch" style="background:#FAE96B"></div>🎯 Prep Party / 🎉 Celebration</div>`;
  h+=`<div class="legend-item"><div class="legend-swatch" style="background:#A8C8E8"></div>📋 Business Forum</div>`;
  h+=`<div class="legend-item" style="display:flex;align-items:center;gap:5px"><div style="width:16px;height:8px;border-radius:3px;background:repeating-linear-gradient(135deg,#0D1822 0px,#0D1822 3px,#0F1F30 3px,#0F1F30 6px);border:1px solid rgba(196,168,255,.3)"></div><span>🏛 US Holiday</span></div>`;;
  h+=`</div></div>`;

  return h;
}

function sbNav(){
  const nav=document.getElementById('sbNav');
  const byYr={};
  E.forEach(e=>{(byYr[e.year]=byYr[e.year]||[]).push(e)});
  let h=`<button class="sb-cal-btn${cView==='cal'&&!cId?' active':''}" data-view="cal" onclick="cView='cal';cId=null;render()" style="position:relative;margin-top:4px">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Event Calendar
  </button>
  <button class="sb-cal-btn${cView==='mod'?' active':''}" onclick="cView='mod';cId=null;render()" style="position:relative;margin-top:4px">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    Community Engagement
  </button>
  <button class="sb-cal-btn${cView==='mm'?' active':''}" onclick="cView='mm';cId=null;render()" style="position:relative;margin-top:4px">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Powerhours
  </button>
  <div class="sb-divider"></div>`;
  Object.entries(byYr).forEach(([yr,evs])=>{
    h+=`<div class="sb-yr">${yr}</div>`;
    evs.forEach(ev=>{
      if(ev.completed){
        h+=`<button class="sb-item${cId===ev.id?' active':''}" data-id="${ev.id}" style="opacity:.45">
          <div class="sb-dot" style="background:${ev.color};opacity:.5"></div>
          <div>
            <div class="sb-name" style="text-decoration:line-through;color:var(--text3)">${ev.short}</div>
            <div class="sb-date" style="color:var(--text3)">${ev.dates}</div>
            <div style="font-size:9px;font-weight:600;color:${ev.color};opacity:.6;margin-top:2px;letter-spacing:.04em">✓ COMPLETED</div>
          </div>
        </button>`;
      } else {
        h+=`<button class="sb-item${cId===ev.id?' active':''}" data-id="${ev.id}">
          <div class="sb-dot" style="background:${ev.color}"></div>
          <div><div class="sb-name">${ev.short}</div><div class="sb-date">${ev.dates}</div></div>
        </button>`;
      }
    });
  });
  nav.innerHTML=h;

  nav.querySelector('[data-view="cal"]').addEventListener('click',()=>{cView='cal';cId=null;render();});
  nav.querySelectorAll('.sb-item').forEach(el=>{
    el.addEventListener('click',()=>{cId=el.dataset.id;cTab='overview';render();});
  });
}

function renderModCal() {
  var MTHS=[{"yr": 2026, "mo": 7, "name": "July 2026"}, {"yr": 2026, "mo": 8, "name": "August 2026"}, {"yr": 2026, "mo": 9, "name": "September 2026"}, {"yr": 2026, "mo": 10, "name": "October 2026"}, {"yr": 2026, "mo": 11, "name": "November 2026"}, {"yr": 2026, "mo": 12, "name": "December 2026"}];
  var mn=modMonth;
  var yr=MTHS[mn].yr, mo=MTHS[mn].mo, name=MTHS[mn].name;
  var dim=daysInMonth(yr,mo), fd=firstDay(yr,mo);
  var h='';
  h+='<div class="cal-wrap">';
  h+='<div class="cal-header">';
  h+='<div class="cal-title-block">';
  h+='<div class="cal-eye">MC Team · Mastery Community Engagement</div>';
  h+='<div class="cal-title" style="color:#00D4E8">'+name+'</div>';
  h+='</div>';
  h+='<div class="month-nav">';
  if(mn>0) h+='<button class="month-nav-btn" id="prevMod"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>';
  else     h+='<button class="month-nav-btn" disabled style="opacity:.3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>';
  h+='<div class="month-label">'+name+'</div>';
  if(mn<5) h+='<button class="month-nav-btn" id="nextMod"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></button>';
  else     h+='<button class="month-nav-btn" disabled style="opacity:.3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></button>';
  h+='</div></div>';
  h+='<div class="cal-grid-5">';
  h+='<div class="day-hdr">Monday</div><div class="day-hdr">Tuesday</div><div class="day-hdr">Wednesday</div><div class="day-hdr">Thursday</div><div class="day-hdr">Friday</div>';
  h+='</div><div class="cal-grid-5">';
  var fd5=fd<5?fd:0;
  for(var i=0;i<fd5;i++) h+='<div class="cal-cell empty"></div>';
  for(var d=1;d<=dim;d++) {
    var dt=new Date(yr,mo-1,d), dow=dt.getDay();
    if(dow===0||dow===6) continue;
    var ds=toKey(yr,mo,d);
    var dls=DL_DAYS[ds]||[];
    var nfzInfo=NFZ_DAYS[ds]||[];
    var isHoliday=dls.some(function(x){return x.light==='#HOLIDAY';});
    var isNFZ=nfzInfo.length>0;
    var cls=isHoliday?'cal-cell holiday':isNFZ?'cal-cell nfz':'cal-cell';
    h+='<div class="'+cls+'">';
    h+='<div class="day-num"><span>'+d+'</span></div>';
    if(isNFZ) {
      h+='<div class="cal-nfz"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>NO FLY ZONE</div>';
    } else if(isHoliday) {
      var hol=dls.find(function(x){return x.light==='#HOLIDAY';});
      if(hol) h+='<div class="hol-label">'+hol.label.replace('🏛 ','')+' </div>';
    }

function render(){
  sbNav();
  const main=document.getElementById('main');
  const ev=E.find(function(e){return e.id===cId;});
  // Set content FIRST, then attach listeners to the freshly rendered elements
  if(cView==='mod') main.innerHTML=renderModCal();
  else if(cView==='mm') main.innerHTML=renderMMCal();
  else if(cId&&ev) main.innerHTML=renderPlaybook(ev);
  else main.innerHTML=renderCalendar();
  // Attach listeners AFTER innerHTML is set
  if(cView==='mod'){
    const pm=document.getElementById('prevMod'),nm=document.getElementById('nextMod');
    if(pm) pm.addEventListener('click',function(){if(modMonth>0){modMonth--;render();}});
    if(nm) nm.addEventListener('click',function(){if(modMonth<5){modMonth++;render();}});
  } else if(cView==='mm'){
    const pmm=document.getElementById('prevMM'),nmm=document.getElementById('nextMM');
    if(pmm) pmm.addEventListener('click',function(){if(mmMonth>0){mmMonth--;render();}});
    if(nmm) nmm.addEventListener('click',function(){if(mmMonth<5){mmMonth++;render();}});
  } else if(cId&&ev){
    // Playbook tab listeners
    document.querySelectorAll('.tab-btn').forEach(function(btn){
      btn.addEventListener('click',function(){cTab=btn.dataset.tab;render();});
    });
    const bb=document.getElementById('backBtn');
    if(bb) bb.addEventListener('click',function(){cId=null;render();});
  } else {
    // Event calendar listeners
    const prev=document.getElementById('prevMonth');
    const next=document.getElementById('nextMonth');
    if(prev) prev.addEventListener('click',function(){if(calMonth>0){calMonth--;render();}});
    if(next) next.addEventListener('click',function(){if(calMonth<MONTHS.length-1){calMonth++;render();}});
    document.querySelectorAll('.cal-cell[data-ev]').forEach(function(cell){
      cell.addEventListener('click',function(){cId=cell.dataset.ev;cTab='overview';render();});
    });
  }
}

render();
